[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "the-second-memo-cartesia"
version = "0.1.1"
description = "The Second Memo integration for Cartesia Line - memory-enhanced voice agents"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "The Second Memo", email = "support@the-second-memo.ai" }
]
keywords = [
    "the-second-memo",
    "cartesia",
    "line",
    "memory",
    "conversational-ai",
    "llm",
    "voice-ai",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "the-second-memo>=3.16.0",
    "cartesia-line>=0.2.0",
    "pydantic>=2.10.0",
    "loguru>=0.7.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.5",
    "pytest-asyncio>=0.24.0",
    "mypy>=1.14.1",
    "black>=24.8.0",
    "isort>=5.13.2",
]

[project.urls]
Homepage = "https://the-second-memo.ai"
Documentation = "https://docs.the-second-memo.ai"
Repository = "https://github.com/the-second-memoai/the-second-memo"

[tool.hatch.build.targets.wheel]
packages = ["src/the-second-memo_cartesia"]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/README.md",
    "/LICENSE",
]

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 100

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
